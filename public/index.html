<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple notes application built with Bun and SQLite. Create, manage, and organize your notes securely." />
    <meta name="keywords" content="notes, app, bun, sqlite, productivity" />
    <meta name="author" content="Seitzhanov Zhanibek" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Bun Notes App" />
    <meta property="og:description" content="A simple notes application built with Bun and SQLite." />
    <meta property="og:type" content="website" />
    <title>Bun Notes App</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Bun Notes App</h1>

      <section id="auth-section">
        <div class="card">
          <h2>Register</h2>
          <form id="register-form">
            <input type="text" id="register-username" placeholder="Username" />
            <input type="password" id="register-password" placeholder="Password" />
            <button type="submit">Register</button>
          </form>
        </div>

        <div class="card">
          <h2>Login</h2>
          <form id="login-form">
            <input type="text" id="login-username" placeholder="Username" />
            <input type="password" id="login-password" placeholder="Password" />
            <button type="submit">Login</button>
          </form>
        </div>
      </section>

      <section id="app-section" class="hidden">
        <div class="toolbar">
          <p>Logged in as <strong id="current-user"></strong></p>
          <button id="logout-btn">Logout</button>
        </div>

        <div class="card">
          <h2>Create note ✏️</h2>
          <form id="note-form">
            <input type="text" id="note-title" placeholder="Title" />
            <textarea id="note-description" placeholder="Description"></textarea>
            <button type="submit">Save note</button>
          </form>
        </div>

        <div class="card">
          <h2>My notes 📒</h2>
          <div id="notes-list"></div>
        </div>
      </section>

      <p id="message"></p>
    </main>

    <script src="./app.ts" defer></script>
  </body>
</html>
